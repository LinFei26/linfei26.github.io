# config/_default/hugo.toml
baseURL = "https://linfei26.github.io/"
languageCode = "zh-cn"
title = "好奇改变世界"
theme = "blowfish"

# 启用 Git 信息
enableGitInfo = true

# 分页设置
paginate = 10

# 多语言支持（如果需要）
defaultContentLanguage = "zh-cn"

[languages]
  [languages.zh-cn]
    languageCode = "zh-cn"
    languageName = "简体中文"
    weight = 1
    title = "好奇改变世界"
    
    [languages.zh-cn.params]
      displayName = "中文"
      isoCode = "zh-cn"
      rtl = false
  
# 分类法配置
[taxonomies]
  tag = "tags"
  category = "categories"
  series = "series"