# config/_default/params.toml

# 颜色方案（可选：blowfish, avocado, cherry, fire, ocean, forest, neon, slate）
colorScheme = "blowfish"

# 默认外观（light/dark/auto）
defaultAppearance = "auto"

# 自动切换外观（跟随系统）
autoSwitchAppearance = true

# 启用搜索功能
enableSearch = true

# 启用代码复制按钮
enableCodeCopy = true

# 显示阅读时间
showReadingTime = true

# 显示字数统计
showWordCount = true

# 显示面包屑导航
showBreadcrumbs = true

# 显示文章目录
showTableOfContents = true

# 文章页面配置
[article]
  showTableOfContents = true  # 启用文章目录
  showHeadingAnchors = true   # 显示标题锚点
  showPagination = true       # 显示上下篇导航
  showReadingTime = true      # 显示阅读时间
  showWordCount = true        # 显示字数统计
  showAuthorsBadges = false   # 不显示作者徽章
  showRelatedContent = true   # 显示相关文章（基于标签）
  relatedContentLimit = 5     # 相关文章数量限制
  showSeries = true           # 显示系列信息（如果主题支持）
  
# 目录行为配置
[tableOfContents]
  open = true  # true=默认展开，false=默认折叠

# 首页配置
[homepage]
  layout = "background"  # page/profile/custom
  showRecent = true
  recentLimit = 5
  homepageImage="homepage3.png"

# 全局背景图配置
backgroundImage ="/assets/homepage3.png"

# 作者信息
[author]
  name = "林非"
  image = "LOGO1.png"
  headline = "好奇改变世界"
  bio = "林非的个人空间 — 机器人技术、游戏设计、日常随笔"
  
# 社交链接
[[socialIcons]]
  name = "github"
  url = "https://github.com/LinFei26"

[[socialIcons]]
  name = "bilibili"
  url = "https://space.bilibili.com/265677658"


# SEO 关键词
keywords = ["ROS2", "机器人", "游戏设计", "博客"]
description = "林非的个人空间 — 机器人技术、游戏设计、日常随笔"